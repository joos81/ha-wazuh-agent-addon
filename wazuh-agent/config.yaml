ARG BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm
FROM ${BUILD_FROM}

ARG BUILD_ARCH
ARG BUILD_VERSION

ENV DEBIAN_FRONTEND=noninteractive

# Base deps + Wazuh repo + Wazuh agent (install at build time)
RUN apt-get update \
  && apt-get install -y --no-install-recommends \
     ca-certificates curl gnupg jq \
  && rm -rf /var/lib/apt/lists/*

# Install Wazuh repository (non-interactive / no tty)
RUN curl -fsSL https://packages.wazuh.com/key/GPG-KEY-WAZUH -o /tmp/wazuh.key \
  && gpg --batch --yes --dearmor -o /usr/share/keyrings/wazuh.gpg /tmp/wazuh.key \
  && rm -f /tmp/wazuh.key \
  && echo "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt stable main" \
     > /etc/apt/sources.list.d/wazuh.list \
  && apt-get update \
  && apt-get install -y --no-install-recommends wazuh-agent \
  && rm -rf /var/lib/apt/lists/*

COPY run.sh /run.sh
RUN chmod +x /run.sh

CMD [ "/run.sh" ]
