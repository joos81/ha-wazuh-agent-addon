name: "Wazuh Agent"
description: "Wazuh Agent add-on for Home Assistant: enrolls an agent and forwards logs/events to a Wazuh Manager."
version: "1.0.3"
slug: "wazuh_agent"

init: false
startup: services
boot: auto

arch:
  - amd64
  - aarch64
  - armv7

# Allow reading host journald (you also mount journal dirs in config)
journald: true

# Do not pin to a specific HA version
homeassistant: null

options:
  manager_address: ""
  agent_name: "home-assistant"
  agent_group: ""
  enrollment_port: 1515
  communication_port: 1514
  enrollment_key: ""
  force_reenroll: false
  security_profile: "minimal"
  debug_dump_config: false

schema:
  manager_address: str
  agent_name: str
  agent_group: str?
  enrollment_port: int
  communication_port: int
  enrollment_key: password
  force_reenroll: bool
  security_profile: list(minimal|standard)
  debug_dump_config: bool

map:
  - config:ro
  - ssl:ro
  - share:ro
  - /var/log/journal:ro
  - /run/log/journal:ro
  - /etc:ro
