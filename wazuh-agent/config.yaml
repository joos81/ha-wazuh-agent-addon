name: "Wazuh Agent"
description: "Wazuh Agent for forwarding Home Assistant logs to a Wazuh Manager."
version: "0.1.19"
slug: "wazuh_agent"
init: false

arch:
  - amd64
  - aarch64
  - armv7

startup: services
boot: auto

options:
  manager_address: ""
  agent_name: "home-assistant"
  agent_group: ""
  enrollment_port: 1515
  communication_port: 1514
  enrollment_key: ""

schema:
  manager_address: str
  agent_name: str
  agent_group: str?
  enrollment_port: int
  communication_port: int
  enrollment_key: str

map:
  - config:ro
  - ssl:ro
  - share:ro
  - /run/log/journal:ro
  - /var/log/journal:ro
  - /etc/machine-id:ro
