name: Release Please

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: API sanity check (whoami + rate limit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "== GitHub API URL =="
          echo "${GITHUB_API_URL}"
          echo "== Who am I =="
          curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/user" | head -c 500 || true
          echo
          echo "== Rate limit =="
          curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/rate_limit" | head -c 2000 || true
          echo

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          package-name: ha-wazuh-agent-addon
          extra-files: |
            wazuh-agent/config.yaml
            repository.yaml
